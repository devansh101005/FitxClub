spring:
  application:
    name: fitness-club

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5433/fitnessclub?currentSchema=public&TimeZone=Asia/Kolkata}
    username: ${DATABASE_USERNAME:fitnessclub}
    password: ${DATABASE_PASSWORD:fitnessclub123}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    clean-disabled: ${FLYWAY_CLEAN_DISABLED:true}

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:noreply@fitnessclub.com}
    password: ${MAIL_PASSWORD:changeme}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=500,expireAfterWrite=60s

server:
  port: ${SERVER_PORT:8080}

app:
  demo-mode: ${APP_DEMO_MODE:false}
  demo-reset-token: ${APP_DEMO_RESET_TOKEN:}
  cors:
    allowed-origins: ${APP_FRONTEND_URL:http://localhost:5173,http://localhost:5174}
  jwt:
    secret: ${JWT_SECRET:veryLongAndSecureSecretKeyForJwtTokenGenerationThatIsAtLeast256BitsLong2024}
    access-token-expiration-ms: ${JWT_ACCESS_EXPIRATION_MS:900000}
    refresh-token-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:604800000}
  qr:
    secret: ${QR_SECRET:qrCodeSigningSecretKeyThatIsSecureEnough2024}
  razorpay:
    key-id: ${RAZORPAY_KEY_ID:rzp_test_REPLACE_ME}
    key-secret: ${RAZORPAY_KEY_SECRET:REPLACE_ME_WITH_SECRET}

springdoc:
  api-docs:
    path: /api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    enabled: true
