spring:
  application:
    name: fitness-club

  datasource:
    url: jdbc:postgresql://localhost:5433/fitnessclub?currentSchema=public&TimeZone=Asia/Kolkata
    username: fitnessclub
    password: fitnessclub123
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:noreply@fitnessclub.com}
    password: ${MAIL_PASSWORD:changeme}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=500,expireAfterWrite=60s

server:
  port: 8080

app:
  jwt:
    secret: ${JWT_SECRET:veryLongAndSecureSecretKeyForJwtTokenGenerationThatIsAtLeast256BitsLong2024}
    access-token-expiration-ms: 900000      # 15 minutes
    refresh-token-expiration-ms: 604800000  # 7 days
  qr:
    secret: ${QR_SECRET:qrCodeSigningSecretKeyThatIsSecureEnough2024}
  razorpay:
    key-id: ${RAZORPAY_KEY_ID:rzp_test_REPLACE_ME}
    key-secret: ${RAZORPAY_KEY_SECRET:REPLACE_ME_WITH_SECRET}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
